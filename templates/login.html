<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudDeDupe – Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">☁️</div>
      <h1>CloudDeDupe</h1>
    </div>
    <p class="auth-subtitle">Secure · Smart · Deduplicated Storage</p>
    <div class="tab-row">
      <a href="{{ url_for('login') }}" class="tab active">Login</a>
      <a href="{{ url_for('register') }}" class="tab">Register</a>
    </div>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="name@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" id="pw" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-primary">Login →</button>
    </form>
    <p class="auth-footer">No account? <a href="{{ url_for('register') }}">Register free</a></p>
  </div>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
